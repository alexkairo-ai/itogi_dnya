<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ИТОГИ ДНЯ</title>
  
  <!-- Иконки для iOS -->
  <link rel="apple-touch-icon" sizes="180x180" href="180x180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="167x167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="152x152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="120x120.png">
  
  <!-- Фавикон -->
  <link rel="icon" type="image/x-icon" href="favicon_32x32.ico">
  <link rel="shortcut icon" href="favicon_32x32.ico">
  
  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0c0f">
  
  <!-- Firebase SDK v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAOuKHmcqUqfWuwwDR00A1kdFuO6bRHW1g",
      authDomain: "itogi-dnya.firebaseapp.com",
      projectId: "itogi-dnya",
      storageBucket: "itogi-dnya.firebasestorage.app",
      messagingSenderId: "300424701358",
      appId: "1:300424701358:web:924b6dc5026fb4085ad43f",
      measurementId: "G-XEPT2RH3BK"
    };
    firebase.initializeApp(firebaseConfig);
    window.db = firebase.firestore();
  </script>
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Форма входа -->
<div id="loginScreen" class="login-container">
  <div class="login-box">
    <h2>🔐 Вход в ИТОГИ ДНЯ</h2>
    <input type="password" id="passwordInput" placeholder="Введите пароль" autocomplete="off">
    <label class="checkbox-label">
      <input type="checkbox" id="rememberMeCheckbox"> Запомнить меня
    </label>
    <button id="loginBtn" class="primary">Войти</button>
    <div id="loginError" style="color: red; margin-top: 10px;"></div>
  </div>
</div>

<!-- Основной контент (скрыт до входа) -->
<div id="appContent" style="display: none;">
  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1>📊 ИТОГИ ДНЯ</h1>
      <button id="adminBtn" class="secondary" style="width: auto;">👥 Управление сотрудниками</button>
    </div>
    <div id="loadingIndicator" style="display: none; text-align: center;">⏳ Загрузка...</div>
    <div class="tabs">
      <button id="tabInput" class="active">Ввод данных</button>
      <button id="tabReports">Просмотр отчётов</button>
    </div>

    <!-- Панель ввода данных -->
    <div id="inputPanel" class="panel">
      <div class="form-row">
        <div class="form-group">
          <label>Дата</label>
          <input type="date" id="reportDate">
        </div>
        <div class="form-group">
          <label>Сотрудник</label>
          <select id="employeeSelect">
            <option value="">-- Выберите имя --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Этап</label>
          <select id="stageSelect">
            <option value="">-- Выберите этап --</option>
            <option value="pila">Пила</option>
            <option value="kromka">Кромка</option>
            <option value="prisadka">Присадка</option>
            <option value="upakovka">Упаковка</option>
            <option value="hdf">Пила ХДФ</option>
          </select>
        </div>
      </div>
      <div class="stats-section">
        <div class="form-group">
          <label>Количество заказов</label>
          <input type="number" id="orderCount" step="1" min="0" value="">
        </div>
        <div class="form-group">
          <label>Метраж / кол-во упаковок</label>
          <input type="number" id="totalAmount" step="any" value="">
        </div>
      </div>
      <button id="saveBtn" class="primary">💾 Сохранить итоги</button>
    </div>

    <!-- Панель просмотра отчётов -->
    <div id="reportsPanel" class="panel" style="display:none;">
      <div class="filters">
        <div class="form-group">
          <label>Дата с</label>
          <input type="date" id="filterDateFrom">
        </div>
        <div class="form-group">
          <label>Дата по</label>
          <input type="date" id="filterDateTo">
        </div>
        <div class="form-group">
          <label>Этап</label>
          <select id="filterStage">
            <option value="all">Все этапы</option>
            <option value="pila">Пила</option>
            <option value="kromka">Кромка</option>
            <option value="prisadka">Присадка</option>
            <option value="upakovka">Упаковка</option>
            <option value="hdf">Пила ХДФ</option>
          </select>
        </div>
        <div class="form-group">
          <label>Сотрудник</label>
          <select id="filterEmployeeSelect">
            <option value="">Все сотрудники</option>
          </select>
        </div>
        <div class="actions">
          <label class="checkbox-label">
            <input type="checkbox" id="adminModeCheckbox"> Режим администратора
          </label>
          <button id="applyFilters" class="secondary">Показать</button>
          <button id="exportExcel" class="secondary">📎 Экспорт в Excel</button>
        </div>
      </div>
      <div class="table-wrapper">
        <div id="matrixContainer"></div>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно управления сотрудниками -->
<div id="adminModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span class="close">&times;</span>
      <h2>Управление сотрудниками</h2>
    </div>
    <div class="modal-body">
      <div style="margin-bottom: 20px;">
        <label>Добавить нового сотрудника:</label>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <input type="text" id="newEmployeeName" placeholder="Имя" style="flex:1;">
          <button id="addEmployeeBtn" class="secondary">Добавить</button>
        </div>
      </div>
      <div id="employeesList"></div>
      <div class="actions" style="margin-top: 20px;">
        <button id="resetEmployeesBtn" class="secondary">Сбросить к списку по умолчанию</button>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно ввода пароля администратора -->
<div id="adminPasswordModal" class="modal">
  <div class="modal-content" style="max-width: 300px;">
    <div class="modal-header">
      <span class="close-admin-modal">&times;</span>
      <h2>Пароль администратора</h2>
    </div>
    <div class="modal-body">
      <input type="password" id="adminPasswordInput" placeholder="Введите пароль" style="width:100%;">
      <div class="actions" style="margin-top: 15px;">
        <button id="submitAdminPasswordBtn" class="primary">Войти</button>
        <button id="cancelAdminPasswordBtn" class="secondary">Отмена</button>
      </div>
      <div id="adminPasswordError" style="color: red; margin-top: 10px;"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  // Авторизация с запоминанием
  const CORRECT_PASSWORD = 'kairo2026';
  const loginScreen = document.getElementById('loginScreen');
  const appContent = document.getElementById('appContent');
  const passwordInput = document.getElementById('passwordInput');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');
  const rememberMeCheckbox = document.getElementById('rememberMeCheckbox');

  const savedPassword = localStorage.getItem('appPassword');
  if (savedPassword === CORRECT_PASSWORD) {
    loginScreen.style.display = 'none';
    appContent.style.display = 'block';
  } else {
    loginScreen.style.display = 'flex';
    appContent.style.display = 'none';
  }

  loginBtn.addEventListener('click', () => {
    if (passwordInput.value === CORRECT_PASSWORD) {
      if (rememberMeCheckbox.checked) {
        localStorage.setItem('appPassword', CORRECT_PASSWORD);
      } else {
        localStorage.removeItem('appPassword');
      }
      loginScreen.style.display = 'none';
      appContent.style.display = 'block';
      if (typeof loadEmployeesList === 'function') loadEmployeesList();
    } else {
      loginError.textContent = 'Неверный пароль';
    }
  });
</script>
</body>
</html>
